<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NZBarr Screenshots</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <nav class="nav">
      <a class="brand" href="index.html"><img src="assets/images/nzbarr-logo-classic.svg" alt="NZBarr logo"><span>NZBarr</span></a>
      <div class="nav-links"><a href="download.html">Download</a><a href="manuals.html">Manuals</a><a href="gallery.html">Screenshots</a><a class="nav-donate" href="support.html">Donate</a><a href="https://github.com/NZBarr/NZBarr-Desktop">GitHub</a></div>
    </nav>
  </header>
  <main class="section">
    <div class="wrap">
      <p class="eyebrow">Screenshots</p>
      <h1>See NZBarr</h1>
      <p class="lead">Screenshots may show movie and TV artwork loaded by a user-configured TMDB or Fanart.tv API key. NZBarr does not include artwork or API keys.</p>
      <div class="screenshot-grid">
        <figure class="shot"><button data-open-shot="assets/images/home-page.jpg"><img src="assets/images/home-page.jpg" alt="NZBarr home page"></button><figcaption>Home page with highlighted library items and visual browsing.</figcaption></figure>
        <figure class="shot"><button data-open-shot="assets/images/browse-page.jpg"><img src="assets/images/browse-page.jpg" alt="NZBarr browse page"></button><figcaption>Browse imported releases with search, filters, and metadata.</figcaption></figure>
        <figure class="shot"><button data-open-shot="assets/images/Library-page.jpg"><img src="assets/images/Library-page.jpg" alt="NZBarr library page"></button><figcaption>Library view groups releases by title.</figcaption></figure>
        <figure class="shot"><button data-open-shot="assets/images/Movie-detail-page-1.jpg"><img src="assets/images/Movie-detail-page-1.jpg" alt="NZBarr movie detail page"></button><figcaption>Movie details show metadata, artwork, cast, and linked NZBs.</figcaption></figure>
        <figure class="shot"><button data-open-shot="assets/images/release-detail-page.jpg"><img src="assets/images/release-detail-page.jpg" alt="NZBarr release detail page"></button><figcaption>Release details include technical information and actions.</figcaption></figure>
        <figure class="shot"><button data-open-shot="assets/images/settings-page.jpg"><img src="assets/images/settings-page.jpg" alt="NZBarr settings page"></button><figcaption>Settings cover API keys, downloaders, preparation folders, and advanced workflows.</figcaption></figure>
      </div>
    </div>
  </main>
  <div class="lightbox" data-lightbox hidden>
    <button data-lightbox-close type="button" aria-label="Close">×</button>
    <img data-lightbox-image alt="">
  </div>
  <script src="assets/js/site.js"></script>
</body>
</html>
